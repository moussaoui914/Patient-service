services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rareCare_app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: rareCare_nginx
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: rareCare_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rareCare
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: rareCare
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: rareCare_pma
    ports:
      - "8000:80"
    environment:
      PMA_HOST: db
      PMA_USER: rareCare
      PMA_PASSWORD: secret
    depends_on:
      - db

volumes:
  db_data: